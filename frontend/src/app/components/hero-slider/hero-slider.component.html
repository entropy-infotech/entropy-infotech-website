<section class="hero-container relative w-full h-[80vh] min-h-[600px] overflow-hidden bg-slate-900">
  
  <!-- Fixed Background Image -->
  <div class="fixed top-0 left-0 w-full h-screen z-0">
    <img 
      src="assets/images/homepage-hero.jpg" 
      alt="Hero Background" 
      class="w-full h-full object-cover"
    >
    <!-- Gradient Overlay that blends slightly at the bottom -->
    <div class="absolute inset-0 bg-gradient-to-b from-slate-900/30 via-transparent to-slate-900/80"></div>
  </div>

  <!-- Hero Content Overlay (Scrolls with page flow initially) -->
  <div class="relative z-10 w-full h-full flex flex-col items-center justify-center px-6">
    
    <div class="w-full max-w-5xl relative min-h-[300px] flex items-center justify-center">
      
      <!-- Slides -->
      <div 
        *ngFor="let slide of slides; let i = index"
        class="absolute inset-x-0 mx-auto flex flex-col items-center justify-center text-center transition-all duration-[1200ms] cubic-bezier(0.16, 1, 0.3, 1) opacity-0 pointer-events-none -z-10"
        [ngClass]="{
          'opacity-100 translate-x-0 scale-100 z-20 pointer-events-auto': i === activeSlideIndex,
          '-translate-x-32 scale-95': i !== activeSlideIndex && (i < activeSlideIndex || (activeSlideIndex === 0 && i === slides.length - 1 && direction === 'next')) && !(i === 0 && activeSlideIndex === slides.length - 1 && direction === 'prev'),
          'translate-x-32 scale-95': i !== activeSlideIndex && (i > activeSlideIndex || (i === 0 && activeSlideIndex === slides.length - 1 && direction === 'next')) && !(activeSlideIndex === 0 && i === slides.length - 1 && direction === 'next')
        }"
      >
        <div class="p-6 md:p-16 w-full transition-transform duration-[1200ms] hover:scale-[1.02]">
           <h1 class="text-3xl md:text-6xl lg:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-white via-blue-100 to-white mb-6 tracking-tight drop-shadow-2xl">
             {{ slide.title }}
           </h1>
           <p class="text-base md:text-2xl text-slate-300 leading-relaxed font-light drop-shadow-md max-w-4xl mx-auto">
             {{ slide.description }}
           </p>
        </div>
      </div>

    </div>

    <!-- Dots Navigation -->
    <div class="flex space-x-3 mt-12 z-30 pt-16">
      <button 
        *ngFor="let slide of slides; let i = index"
        (click)="setSlide(i)"
        class="w-3 h-3 rounded-full transition-all duration-300 shadow-md"
        [ngClass]="{
          'bg-white w-10': i === activeSlideIndex,
          'bg-white/40 hover:bg-white/70': i !== activeSlideIndex
        }"
        [attr.aria-label]="'Go to slide ' + (i + 1)"
      ></button>
    </div>

  </div>

</section>
